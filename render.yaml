services:
  # ── Backend API (FastAPI + Docker) ─────────────────────────────────────
  - type: web
    name: loyaltytoolor
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_3NKgvsFrW5io@ep-blue-boat-amiwae15-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: toolor-jwt-secret-2024-prod
      - key: QR_SECRET
        value: toolor-qr-secret-2024
      - key: CORS_ORIGINS
        value: '["https://toolor-admin.onrender.com","https://loyaltytoolor.onrender.com","https://toolor-app.onrender.com","http://localhost:3000"]'
      - key: ADMIN_PHONE
        value: "+996999955000"
      - key: UPLOAD_DIR
        value: /app/uploads

  # ── Admin Panel (Next.js + Docker) ─────────────────────────────────────
  - type: web
    name: toolor-admin
    runtime: docker
    dockerfilePath: ./admin/Dockerfile
    dockerContext: ./admin
    plan: starter
    region: oregon
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://loyaltytoolor.onrender.com
      - key: NODE_ENV
        value: production

  # ── Flutter Web App (Docker + nginx) ───────────────────────────────────
  - type: web
    name: toolor-app
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    plan: starter
    region: oregon
    autoDeploy: true
