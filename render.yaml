services:
  # ── Backend API (FastAPI + Docker) ─────────────────────────────────────
  - type: web
    name: loyaltytoolor
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false  # set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: QR_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: '["https://toolor-admin.onrender.com","https://loyaltytoolor-xwwj.onrender.com","http://localhost:3000"]'
      - key: ADMIN_PHONE
        value: "+996999955000"
      - key: UPLOAD_DIR
        value: /app/uploads

  # ── Admin Panel (Next.js + Docker) ─────────────────────────────────────
  - type: web
    name: toolor-admin
    runtime: docker
    dockerfilePath: ./admin/Dockerfile
    dockerContext: ./admin
    plan: starter
    region: oregon
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://loyaltytoolor-xwwj.onrender.com
      - key: NODE_ENV
        value: production
