app = 'toolor-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = '["https://toolor-admin.vercel.app","http://localhost:3000","http://localhost:3001"]'
  UPLOAD_DIR = '/app/uploads'
  ADMIN_PHONE = '+996999955000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'toolor_uploads'
  destination = '/app/uploads'
