# Supabase local development configuration for TOOLOR
# See: https://supabase.com/docs/guides/cli/config

[project]
id = "toolor"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:3000"

[auth.external.phone]
enabled = true

[storage]
enabled = true
file_size_limit = "10MB"
